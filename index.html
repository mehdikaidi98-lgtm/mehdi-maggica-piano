<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mehdi AI Piano + Link</title>
    <style>
        /* Mise en page globale */
        body { 
            background: #1a1a2e; 
            display: flex; 
            flex-direction: row; /* Colonne à gauche, piano à droite */
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* LA NOUVELLE COLONNE À GAUCHE */
        .sidebar {
            width: 150px;
            height: 80%;
            background: rgba(255, 255, 255, 0.05);
            border-right: 2px solid #4cc9f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-right: 40px;
            border-radius: 0 20px 20px 0;
        }

        .nav-button {
            background: #f72585;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 0 15px #f72585;
        }

        .nav-button:hover {
            transform: scale(1.1);
            background: #ff4d94;
        }

        /* STYLE DU PIANO (Inchangé) */
        .main-content { display: flex; flex-direction: column; align-items: center; }
        .title { color: #4cc9f0; font-size: 2.5rem; text-shadow: 0 0 15px #4cc9f0; margin-bottom: 20px; }
        .piano-container { background: #000; padding: 20px; border-radius: 15px; border: 2px solid #4cc9f0; }
        .piano { display: flex; position: relative; }
        .key { cursor: pointer; transition: all 0.1s; user-select: none; }
        .white { width: 45px; height: 200px; background: white; border: 1px solid #ccc; border-radius: 0 0 8px 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; color: #333; font-weight: bold; }
        .black { width: 30px; height: 120px; background: #222; margin: 0 -15px; z-index: 2; border-radius: 0 0 5px 5px; }
        .white:active { background: #4cc9f0; color: white; }
    </style>
</head>
<body>

            VOIR MA PAGE <br> EN LIGNE 🚀
        </a>
    </div>
