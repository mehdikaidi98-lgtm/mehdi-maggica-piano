<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Piano XL de Mehdi avec Mode IA</title>
    <style>
        /* Mise en page globale */
        body { 
            background: #1a1a2e; 
            display: flex; 
            flex-direction: row; /* Colonne à gauche, piano à droite */
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* LA PETITE COLONNE À GAUCHE */
        .sidebar {
            width: 120px;
            height: 80%;
            background: rgba(255, 255, 255, 0.05);
            border-right: 2px solid #2ecc71;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin-right: 30px;
            border-radius: 0 20px 20px 0;
        }

        .sidebar-title {
            color: #2ecc71;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #2ecc71;
        }

        .nav-button {
            background: #f72585;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 0 10px #f72585;
            font-size: 0.9rem;
        }

        .nav-button:hover {
            transform: scale(1.05);
            background: #ff4d94;
        }

        /* STYLE DU PIANO (Basé sur ton Piano XL) */
        .main-content { display: flex; flex-direction: column; align-items: center; }
        .title { color: #2ecc71; font-size: 2.5rem; text-shadow: 0 0 15px #2ecc71; margin-bottom: 20px; }
        .piano-container { background: #333; padding: 15px; border-radius: 12px; border: 2px solid #2ecc71; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .piano { display: flex; position: relative; }
        .key { cursor: pointer; transition: all 0.1s; user-select: none; }
        .white { width: 38px; height: 180px; background: white; border: 1px solid #ddd; border-radius: 0 0 6px 6px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; color: #bbb; font-weight: bold; font-size: 0.7rem; }
        .black { width: 26px; height: 110px; background: #222; margin: 0 -13px; z-index: 2; border-radius: 0 0 4px 4px; }
        
        /* Couleur quand on clique */
        .white:active, .white.active { background: #2ecc71; color: white; }
        .black:active, .black.active { background: #27ae60; }
        
        /* Couleur spéciale pour le mode IA */
        .ia-mode-active .white:active, .ia-mode-active .white.active { background: #f72585; color: white; }
        .ia-mode-active .black:active, .ia-mode-active .black.active { background: #ff4d94; }
    </style>
</head>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Fonction pour jouer une note simple

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }
