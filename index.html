<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mehdi Piano XL - Orchestre</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        #welcome-screen { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #0f0f1a); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .start-btn { padding: 20px 40px; font-size: 1.5rem; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #2ecc71; }
        #piano-interface { display: none; height: 100vh; flex-direction: row; align-items: center; justify-content: center; }
        .sidebar { width: 200px; height: 90%; background: rgba(255, 255, 255, 0.05); border-right: 3px solid #2ecc71; display: flex; flex-direction: column; align-items: center; padding: 15px; border-radius: 0 20px 20px 0; overflow-y: auto; }
        .orch-btn { width: 100%; padding: 12px; margin: 5px 0; background: #f72585; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .piano-container { background: #333; padding: 20px; border-radius: 15px; border: 2px solid #2ecc71; }
        .piano { display: flex; }
        .key { cursor: pointer; transition: 0.1s; }
        .white { width: 45px; height: 220px; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; color: #333; font-weight: bold; }
        .black { width: 32px; height: 130px; background: #222; margin: 0 -16px; z-index: 2; border-radius: 0 0 5px 5px; }
        .active-key { background: #2ecc71 !important; }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <h1 style="color: #2ecc71;">MEHDI PIANO XL</h1>
        <button class="start-btn" onclick="enterPiano()">OUVRIR LE PIANO 🎹</button>
    </div>
    <div id="piano-interface">
        <div class="sidebar">
            <h3 style="color:#2ecc71">ORCHESTRE</h3>
            <button class="orch-btn" onclick="playMelody('elise')">Lettre à Élise</button>
            <button class="orch-btn" onclick="playMelody('starwars')">Star Wars</button>
            <button class="orch-btn" onclick="playMelody('mario')">Mario Bros</button>
        </div>
        <div class="main-content">
            <h1 style="color:#2ecc71">Mehdi Piano XL</h1>
            <div class="piano-container"><div class="piano" id="keyboard"></div></div>
        </div>
    </div>
    <script>
        let audioCtx;
        const freqs = [261, 277, 293, 311, 329, 349, 370, 392, 415, 440, 466, 494, 523];
        const names = ["DO", "", "RE", "", "MI", "FA", "", "SOL", "", "LA", "", "SI", "DO"];
        const melodies = {
            'elise': [659, 622, 659, 622, 659, 494, 587, 523, 440],
            'starwars': [440, 440, 440, 349, 523, 440],
            'mario': [659, 659, 659, 523, 659, 784, 392]
        };
        function enterPiano() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('piano-interface').style.display = 'flex';
            build();
        }
        function build() {
            const kb = document.getElementById('keyboard');
            freqs.forEach((f, i) => {
                const key = document.createElement('div');
                key.className = `key ${names[i] ? 'white' : 'black'}`;
                key.id = "key-" + f;
                if(names[i]) key.innerHTML = names[i];
                key.onclick = () => playNote(f);
                kb.appendChild(key);
            });
        }
        function playNote(f) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = f;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }
        async function playMelody(m) {
            for(let f of melodies[m]) {
                const el = document.getElementById("key-" + f);
                if(el) el.classList.add('active-key');
                playNote(f);
                await new Promise(r => setTimeout(r, 300));
                if(el) el.classList.remove('active-key');
            }
        }
    </script>
</body>
</html>
