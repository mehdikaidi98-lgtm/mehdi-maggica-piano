<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mehdi Piano - Écho 5 Secondes</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; overflow: hidden; }
        
        /* PAGE DE GARDE */
        #welcome-screen {
            position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #0f0f1a);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .start-btn { padding: 20px 40px; font-size: 1.5rem; background: #2ecc71; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #2ecc71; }

        #piano-interface { display: none; height: 100vh; flex-direction: row; align-items: center; justify-content: center; }
        
        /* SIDEBAR */
        .sidebar { 
            width: 220px; height: 95%; background: rgba(255, 255, 255, 0.05); 
            border-right: 3px solid #2ecc71; display: flex; flex-direction: column; 
            align-items: center; padding: 10px; border-radius: 0 20px 20px 0;
            overflow-y: auto;
        }
        .orch-btn {
            width: 95%; padding: 12px; margin: 5px 0; background: #f72585; 
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        .orch-btn:hover { background: #4cc9f0; }

        /* PIANO LARGE */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .piano-container { background: #333; padding: 20px; border-radius: 15px; border: 2px solid #2ecc71; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .piano { display: flex; }
        .key { cursor: pointer; transition: 0.1s; position: relative; }
        .white { width: 50px; height: 230px; background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; color: #333; font-weight: bold; }
        .black { width: 34px; height: 140px; background: #222; margin: 0 -17px; z-index: 2; border-radius: 0 0 5px 5px; }
        
        .active-key { background: #2ecc71 !important; transform: translateY(5px); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1 style="color: #2ecc71; font-size: 4rem; letter-spacing: 5px; text-shadow: 0 0 20px #2ecc71;">MEHDI PIANO</h1>
        <button class="start-btn" onclick="enterPiano()">DÉMARRER L'ORCHESTRE 🎼</button>
    </div>

    <div id="piano-interface">
        <div class="sidebar">
            <h3 style="color:#2ecc71">10 MUSIQUES</h3>
            <button class="orch-btn" onclick="playMelody('mario')">1. Mario Bros 🍄</button>
            <button class="orch-btn" onclick="playMelody('elise')">2. Lettre à Élise 🎹</button>
            <button class="orch-btn" onclick="playMelody('starwars')">3. Star Wars 🚀</button>
            <button class="orch-btn" onclick="playMelody('pirate')">4. Pirates 🏴‍☠️</button>
            <button class="orch-btn" onclick="playMelody('potter')">5. Harry Potter ⚡</button>
            <button class="orch-btn" onclick="playMelody('mission')">6. Mission Impossible 🕶️</button>
            <button class="orch-btn" onclick="playMelody('bella')">7. Bella Ciao 🎶</button>
            <button class="orch-btn" onclick="playMelody('jingle')">8. Vive le Vent ❄️</button>
            <button class="orch-btn" onclick="playMelody('titanic')">9. Titanic 🚢</button>
            <button class="orch-btn" onclick="playMelody('queen')">10. We Will Rock You 🥁</button>
        </div>

        <div class="main-content">
            <h1 style="color:#2ecc71; margin-bottom: 30px;">Mehdi Piano XL</h1>
            <div class="piano-container">
                <div class="piano" id="keyboard"></div>
            </div>
        </div>
    </div>

    <script>
        let audioCtx;
        const freqs = [261, 277, 293, 311, 329, 349, 370, 392, 415, 440, 466, 494, 523, 554, 587, 622, 659, 698, 740, 784, 831, 880, 932, 988];
        const names = ["DO", "", "RE", "", "MI", "FA", "", "SOL", "", "LA", "", "SI", "DO", "", "RE", "", "MI", "FA", "", "SOL", "", "LA", "", "SI"];

        const melodies = {
            'mario': [659, 659, 659, 523, 659, 784, 392],
            'elise': [659, 622, 659, 622, 659, 494, 587, 523, 440],
            'starwars': [440, 440, 440, 349, 523, 440],
            'pirate': [293, 349, 440, 440, 440, 494, 523],
            'potter': [494, 659, 784, 740, 659, 988],
            'mission': [440, 440, 523, 587, 440, 440, 392],
            'bella': [440, 494, 523, 440, 440, 494, 523],
            'jingle': [659, 659, 659, 659, 659, 659, 659, 784, 523, 587, 659],
            'titanic': [523, 523, 523, 523, 494, 523, 523, 494, 523, 587, 659],
            'queen': [261, 261, 329, 261, 261, 329]
        };

        function enterPiano() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('piano-interface').style.display = 'flex';
            build();
        }

        function build() {
            const kb = document.getElementById('keyboard');
            freqs.forEach((f, i) => {
                const key = document.createElement('div');
                key.className = `key ${names[i] ? 'white' : 'black'}`;
                key.id = "k-" + f;
                if(names[i]) key.innerHTML = `<span>${names[i]}</span>`;
                key.onclick = () => playNote(f);
                kb.appendChild(key);
            });
        }

        function playNote(f, d = 5.0) { // DURÉE DU SON : 5 SECONDES
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = f;
            g.gain.setValueAtTime(0.08, audioCtx.currentTime); // Volume doux pour éviter les craquements
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        async function playMelody(m) {
            for(let f of melodies[m]) {
                const el = document.getElementById("k-" + f);
                if(el) el.classList.add('active-key');
                playNote(f, 5.0); // Le son résonne 5 secondes
                await new Promise(r => setTimeout(r, 250)); // Les notes s'enchaînent vite (0.25s)
                if(el) el.classList.remove('active-key');
            }
        }
    </script>
</body>
</html>
