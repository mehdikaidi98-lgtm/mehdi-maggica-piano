<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Piano XL de Mehdi</title>
    <style>
        body { background: #f0f4f8; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; padding: 50px; }
        .name { color: #2ecc71; font-size: 3rem; margin-bottom: 20px; }
        
        /* Conteneur noir pour tenir toutes les touches */
        .piano-frame {
            background: #333;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .piano { display: flex; position: relative; }

        .key { cursor: pointer; position: relative; transition: 0.1s; user-select: none; }

        /* Touches blanches (40px de large pour en mettre 14) */
        .white { 
            width: 40px; height: 200px; background: white; 
            border: 1px solid #ddd; border-radius: 0 0 5px 5px;
            display: flex; align-items: flex-end; justify-content: center;
            padding-bottom: 10px; font-weight: bold; color: #bbb; font-size: 0.7rem;
        }

        /* Touches noires */
        .black { 
            width: 26px; height: 120px; background: #222; 
            margin: 0 -13px; z-index: 2; border-radius: 0 0 3px 3px; 
        }

        .white:active { background: #2ecc71; color: white; }
        .black:active { background: #27ae60; }
    </style>
</head>
<body>

    <h1 class="name">Mehdi</h1>

    <div class="piano-frame">
        <div class="piano">
            <div class="key white" onclick="play(261)"><span>DO</span></div>
            <div class="key black" onclick="play(277)"></div>
            <div class="key white" onclick="play(293)"><span>RÉ</span></div>
            <div class="key black" onclick="play(311)"></div>
            <div class="key white" onclick="play(329)"><span>MI</span></div>
            <div class="key white" onclick="play(349)"><span>FA</span></div>
            <div class="key black" onclick="play(370)"></div>
            <div class="key white" onclick="play(392)"><span>SOL</span></div>
            <div class="key black" onclick="play(415)"></div>
            <div class="key white" onclick="play(440)"><span>LA</span></div>
            <div class="key black" onclick="play(466)"></div>
            <div class="key white" onclick="play(494)"><span>SI</span></div>
            <div class="key white" onclick="play(523)"><span>DO</span></div>
            <div class="key black" onclick="play(554)"></div>
            <div class="key white" onclick="play(587)"><span>RÉ</span></div>
            <div class="key black" onclick="play(622)"></div>
            <div class="key white" onclick="play(659)"><span>MI</span></div>
            <div class="key white" onclick="play(698)"><span>FA</span></div>
            <div class="key black" onclick="play(740)"></div>
            <div class="key white" onclick="play(784)"><span>SOL</span></div>
            <div class="key black" onclick="play(831)"></div>
            <div class="key white" onclick="play(880)"><span>LA</span></div>
            <div class="key black" onclick="play(932)"></div>
            <div class="key white" onclick="play(988)"><span>SI</span></div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function play(f) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.value = f;
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + 1);
        }
    </script>
</body>
</html>
