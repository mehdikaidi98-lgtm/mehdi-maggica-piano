<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Piano XL de Mehdi</title>
    <style>
        body { background: #1a1a2e; display: flex; flex-direction: row; align-items: center; justify-content: center; font-family: sans-serif; color: white; margin: 0; height: 100vh; }
        
        /* COLONNE GAUCHE */
        .sidebar {
            width: 140px; height: 80%; background: rgba(255, 255, 255, 0.1);
            border-right: 3px solid #2ecc71; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; padding: 15px; border-radius: 0 20px 20px 0;
        }

        .btn {
            background: #f72585; color: white; border: none; padding: 10px;
            border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 0.8rem;
        }

        .btn-start { background: #4cc9f0; box-shadow: 0 0 10px #4cc9f0; margin-bottom: 10px; }

        /* PIANO */
        .main { display: flex; flex-direction: column; align-items: center; }
        .piano-container { background: #333; padding: 20px; border-radius: 15px; border: 2px solid #2ecc71; }
        .piano { display: flex; }
        .key { cursor: pointer; position: relative; }
        .white { width: 40px; height: 200px; background: white; border: 1px solid #ddd; border-radius: 0 0 5px 5px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 10px; color: #333; font-weight: bold; font-size: 0.8rem; }
        .black { width: 28px; height: 120px; background: #222; margin: 0 -14px; z-index: 2; border-radius: 0 0 3px 3px; }
        .white:active { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="text-align:center; color:#2ecc71; font-weight:bold;">AI MUSIC</div>
        
        <button class="btn btn-start" onclick="startAudio()">1. DÉMARRER <br> LE SON 🔊</button>
        
        <button id="aiBtn" class="btn" onclick="toggleIA()">2. ACTIVER <br> IA MODE ⭐</button>
    </div>

    <div class="main">
        <h1 style="color:#2ecc71;">Mehdi Piano XL</h1>
        <div class="piano-container">
            <div class="piano" id="keyboard">
                </div>
        </div>
    </div>

    <script>
        let audioCtx;
        let isIA = false;
        const freqs = [261, 277, 293, 311, 329, 349, 370, 392, 415, 440, 466, 494, 523, 554, 587, 622, 659, 698, 740, 784, 831, 880, 932, 988];
        const names = ["DO", "", "RE", "", "MI", "FA", "", "SOL", "", "LA", "", "SI", "DO", "", "RE", "", "MI", "FA", "", "SOL", "", "LA", "", "SI"];

        // CREE LE PIANO
        const keyboard = document.getElementById('keyboard');
        freqs.forEach((f, i) => {
            const key = document.createElement('div');
            key.className = `key ${names[i] ? 'white' : 'black'}`;
            if(names[i]) key.innerHTML = `<span>${names[i]}</span>`;
            key.onclick = () => playKey(f);
            keyboard.appendChild(key);
        });

        function startAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            alert("Son activé ! Tu peux jouer.");
        }

        function playNote(f, d = 0.5) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = f;
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        async function playMelody(m) {
            const songs = {
                'elise': [659, 622, 659, 622, 659, 494, 587, 523, 440],
                'wars': [440, 440, 440, 349, 523, 440]
            };
            for(let f of songs[m]) {
                playNote(f, 0.3);
                await new Promise(r => setTimeout(r, 350));
            }
        }

        function playKey(f) {
            if(isIA) {
                if(f === 329) { playMelody('elise'); return; }
                if(f === 392) { playMelody('wars'); return; }
            }
            playNote(f);
        }

        function toggleIA() {
            isIA = !isIA;
            document.getElementById('aiBtn').style.background = isIA ? "#2ecc71" : "#f72585";
            document.getElementById('aiBtn').innerHTML = isIA ? "MODE IA <br> ON ⭐" : "2. ACTIVER <br> IA MODE ⭐";
        }
    </script>
</body>
</html>
